apiVersion: apps/v1
kind: Deployment
metadata:
    
  
  labels:
    app: gitops-devops-platform-deployment
  name: gitops-devops-platform-deployment
  namespace: default
  

spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: gitops-devops-platform-deployment
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: gitops-devops-platform-deployment
    spec:
      containers:
      - image: yash7516/gitops-devops-platform:latest
        imagePullPolicy: Always
        name: gitops-devops-platform
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30

